services:
  ray-head:
    build: .
    container_name: ray-head
    hostname: ray-head
    mem_limit: 6g
    memswap_limit: 8g
    command: >
      bash -c "
      ray start --head
      --node-ip-address=ray-head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --block
      "
    ports:
      - "8265:8265"
      - "6379:6379"
      - "10001:10001"
    volumes:
      - .:/app
    shm_size: "2gb"

  ray-worker-1:
    build: .
    container_name: ray-worker-1
    hostname: ray-worker-1
    mem_limit: 6g
    memswap_limit: 8g
    command: >
      bash -c "
      sleep 5 &&
      ray start --address=ray-head:6379 --block
      "
    depends_on:
      - ray-head
    volumes:
      - .:/app
    shm_size: "2gb"

  ray-worker-2:
    build: .
    container_name: ray-worker-2
    hostname: ray-worker-2
    mem_limit: 6g
    memswap_limit: 8g
    command: >
      bash -c "
      sleep 5 &&
      ray start --address=ray-head:6379 --block
      "
    depends_on:
      - ray-head
    volumes:
      - .:/app
    shm_size: "2gb"

  ray-worker-3:
    build: .
    container_name: ray-worker-3
    hostname: ray-worker-3
    mem_limit: 6g
    memswap_limit: 8g
    command: >
      bash -c "
      sleep 5 &&
      ray start --address=ray-head:6379 --block
      "
    depends_on:
      - ray-head
    volumes:
      - .:/app
    shm_size: "2gb"

  dashboard:
    build: .
    container_name: atus-dashboard
    hostname: atus-dashboard
    command: >
      bash -c "
      streamlit run dashboard/app.py
      --server.address=0.0.0.0
      --server.port=8501
      "
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - ray-head